<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - ResFood</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- Header Placeholder -->
  <header id="global-header"></header>

  <main>
    <div class="auth-container">
      <div class="glass-card animate-slide-up">
        <div class="auth-header">
          <h1>Selamat Datang Kembali</h1>
          <p>Masuk ke akun ResFood Anda untuk melanjutkan penyelamatan pangan</p>
        </div>

        <div id="auth-alert" class="alert"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" class="form-input" placeholder="email@domain.com" required autocomplete="email">
          </div>

          <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password">Kata Sandi</label>
            <div style="position: relative;">
              <input type="password" id="password" class="form-input" placeholder="Masukkan kata sandi Anda" required style="padding-right: 3rem;" autocomplete="current-password">
              <button type="button" id="toggle-password" title="Tampilkan/Sembunyikan kata sandi" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.25rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; font-size: 1rem;">Masuk</button>
        </form>

        <!-- Demo accounts hint -->
        <div style="margin-top: 1rem; padding: 0.75rem 1rem; background: var(--primary-light-bg); border-radius: 0.75rem; font-size: 0.78rem; color: var(--text-secondary);">
          <strong style="color: var(--primary);">💡 Akun Demo Tersedia:</strong><br>
          Mitra Restoran: <code>mitra@resfood.com</code> / <code>password123</code><br>
          Org. Sosial: <code>panti@resfood.com</code> / <code>password123</code><br>
          Masyarakat: <code>budi@resfood.com</code> / <code>password123</code>
        </div>

        <div class="auth-footer">
          Belum punya akun? <a href="/auth/register.html">Daftar sekarang</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Placeholder -->
  <footer id="global-footer"></footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Password visibility toggle
    document.getElementById('toggle-password').addEventListener('click', () => {
      const pwInput = document.getElementById('password');
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
