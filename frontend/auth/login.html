<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - ResFood</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- Header Placeholder -->
  <header id="global-header"></header>

  <main>
    <div class="auth-container">
      <div class="glass-card animate-slide-up">
        <div class="auth-header">
          <h1>Selamat Datang Kembali</h1>
          <p>Masuk ke akun ResFood Anda untuk melanjutkan penyelamatan pangan</p>
        </div>

        <div id="auth-alert" class="alert"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" class="form-input" placeholder="mitra@resfood.com atau panti@resfood.com" required>
          </div>

          <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" class="form-input" placeholder="Masukkan kata sandi Anda" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; font-size: 1rem;">Masuk</button>
        </form>

        <div class="auth-footer">
          Belum punya akun? <a href="/auth/register.html">Daftar sekarang</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Placeholder -->
  <footer id="global-footer"></footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
