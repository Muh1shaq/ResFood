<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun Baru - ResFood</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- Header Placeholder -->
  <header id="global-header"></header>

  <main>
    <div class="auth-container">
      <div class="glass-card animate-slide-up">
        <div class="auth-header">
          <h1>Bergabung Bersama ResFood</h1>
          <p>Mulai berkontribusi dalam ekosistem ketahanan pangan dan pencegahan pemborosan makanan</p>
        </div>

        <div id="auth-alert" class="alert"></div>

        <form id="register-form">
          
          <!-- Role selector -->
          <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">
            Pilih Peran Anda
          </label>
          <div class="role-selector">
            <div class="role-option active" data-role="public">
              <p>Masyarakat / UMKM</p>
            </div>
            <div class="role-option" data-role="restaurant">
              <p>Mitra Bisnis Kuliner</p>
            </div>
            <div class="role-option" data-role="nonprofit" style="grid-column: span 2;">
              <p>Organisasi Sosial / Non-Profit</p>
            </div>
          </div>

          <div class="form-group">
            <label for="name">Nama Lengkap / Instansi</label>
            <input type="text" id="name" class="form-input" placeholder="Masukkan nama Anda atau nama toko/lembaga" required>
          </div>

          <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" class="form-input" placeholder="Masukkan alamat email Anda" required>
          </div>

          <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" class="form-input" placeholder="Buat kata sandi (8-20 karakter)" required minlength="8" maxlength="20">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; font-size: 1rem;">Daftar Akun</button>
        </form>

        <div class="auth-footer">
          Sudah punya akun? <a href="/auth/login.html">Masuk di sini</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Placeholder -->
  <footer id="global-footer"></footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
